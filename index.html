<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PropEdge V8</title>
<style>
  :root {
    --bg:#0a0a0f; --card:#13131a; --card2:#1a1a24; --border:#2a2a3a;
    --t1:#00e5a0; --t2:#4da6ff; --t3:#888;
    --over:#00e5a0; --under:#ff6b6b; --win:#00e5a0; --loss:#ff6b6b; --push:#888;
    --text:#f0f0f0; --muted:#888; --accent:#7c3aed; --r:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;min-height:100vh}

  /* ── HEADER ── */
  .header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);padding:12px 16px 8px;border-bottom:1px solid var(--border)}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .logo{font-size:20px;font-weight:800;letter-spacing:-0.5px}
  .logo span{color:var(--t1)}
  .season-pills{display:flex;gap:8px}
  .season-pill{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--muted)}
  .season-pill b{color:var(--text)}
  /* Search row — hidden on stats tab */
  .search-row{display:flex;gap:6px;align-items:center}
  .search-row.hidden{display:none}
  .search-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:14px;outline:none}
  .search-input::placeholder{color:var(--muted)}
  .search-btn{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;cursor:pointer;color:var(--muted);font-size:16px;flex-shrink:0;transition:background 0.15s}
  .search-btn:active{background:var(--accent);color:#fff}

  /* ── NAV TABS ── */
  .nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
  .nav::-webkit-scrollbar{display:none}
  .nav-tab{flex-shrink:0;padding:11px 18px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
  .nav-tab.active{color:var(--t1);border-bottom-color:var(--t1)}

  /* ── DATE CHIPS ── */
  .date-row{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .date-row::-webkit-scrollbar{display:none}
  .date-chip{flex-shrink:0;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;color:var(--muted)}
  .date-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

  /* ── TIER FILTER ── */
  .tier-row{display:flex;gap:6px;padding:0 16px 10px}
  .tier-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
  .tier-btn.t1{color:var(--t1)} .tier-btn.t2{color:var(--t2)} .tier-btn.t3{color:var(--t3)}
  .tier-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

  /* ── MATCH SELECTOR ── */
  .match-selector{padding:0 12px 8px}
  .match-select{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none}

  /* ── STATUS BAR ── */
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:4px 16px 8px;font-size:11px;color:var(--muted)}
  .status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
  .status-dot.live{background:var(--t1);animation:pulse 1.5s infinite}
  .status-dot.done{background:#888}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* ── CARDS ── */
  .cards{padding:0 12px 80px;display:flex;flex-direction:column;gap:10px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
  .card.t1::before{background:var(--t1)} .card.t2::before{background:var(--t2)} .card.t3::before{background:var(--t3)}

  .card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
  .player-name{font-size:16px;font-weight:700}
  .player-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .tier-badge{font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px}
  .tier-badge.T1{background:rgba(0,229,160,0.15);color:var(--t1)}
  .tier-badge.T2{background:rgba(77,166,255,0.15);color:var(--t2)}
  .tier-badge.T3{background:rgba(136,136,136,0.1);color:var(--t3)}

  /* Stats row: Line / L10 / L20 / L30 */
  .stats-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .kv{display:flex;flex-direction:column;align-items:center}
  .kv-l{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:2px}
  .kv-v{font-size:13px;font-weight:700}
  .kv-divider{width:1px;height:28px;background:var(--border);margin:0 2px}
  .spark-wrap{margin-left:auto}

  /* Score bubbles */
  .bubbles-row{display:flex;gap:3px;margin-bottom:8px;flex-wrap:nowrap;overflow:hidden}
  .bubble{display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0}
  .bubble-venue{font-size:7px;line-height:1;opacity:.6;height:9px}
  .bubble-score{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px}

  /* Direction + line + movement + conf */
  .card-mid{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .direction-pill{font-size:20px;font-weight:900;letter-spacing:-1px}
  .direction-pill.OVER{color:var(--over)} .direction-pill.UNDER{color:var(--under)}
  .line-block{}
  .line-display{font-size:16px;font-weight:700}
  .line-move-pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;margin-top:2px}
  .line-move-pill.up{background:rgba(255,107,107,0.15);color:#ff6b6b}
  .line-move-pill.down{background:rgba(0,229,160,0.15);color:var(--t1)}
  .line-move-pill.same{background:rgba(136,136,136,0.1);color:var(--muted)}
  .conf-bar-wrap{flex:1}
  .conf-pct{font-size:13px;font-weight:700;margin-bottom:3px}
  .conf-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .conf-bar-fill{height:100%;border-radius:2px}

  .card-bottom{display:flex;gap:6px;flex-wrap:wrap}
  .tag{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted)}
  .tag.def{font-weight:700}
  .tag.def.top{color:#ff6b6b;border-color:rgba(255,107,107,0.3)}
  .tag.def.mid{color:#ffd166;border-color:rgba(255,209,102,0.3)}
  .tag.def.bot{color:var(--t1);border-color:rgba(0,229,160,0.3)}

  /* Result badge */
  .result-badge{position:absolute;top:10px;right:10px;font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px}
  .result-badge.WIN{background:rgba(0,229,160,0.15);color:var(--win)}
  .result-badge.LOSS{background:rgba(255,107,107,0.15);color:var(--loss)}
  .result-badge.PUSH{background:rgba(136,136,136,0.15);color:var(--push)}
  .result-badge.DNP{background:rgba(136,136,136,0.1);color:var(--muted)}

  /* ── LEADERBOARD ── */
  .lb-header{display:grid;grid-template-columns:36px 1fr 55px 55px 55px 55px;gap:6px;padding:8px 16px;font-size:10px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)}
  .lb-row{display:grid;grid-template-columns:36px 1fr 55px 55px 55px 55px;gap:6px;padding:10px 16px;font-size:13px;border-bottom:1px solid rgba(42,42,58,0.5);align-items:center}
  .lb-row:nth-child(odd){background:rgba(255,255,255,0.01)}
  .lb-rank{font-weight:800;color:var(--muted);font-size:12px}
  .lb-rank.gold{color:#ffd700} .lb-rank.silver{color:#c0c0c0} .lb-rank.bronze{color:#cd7f32}
  .lb-name{font-weight:600} .lb-team{font-size:11px;color:var(--muted)}
  .lb-num{text-align:center;font-weight:700}
  .lb-hr{text-align:center;font-weight:700;color:var(--t1)}

  /* ── STATS PAGE ── */
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
  .stat-val{font-size:28px;font-weight:900;margin-bottom:4px}
  .stat-lbl{font-size:12px;color:var(--muted)}
  .stat-sub{font-size:11px;color:var(--muted);margin-top:2px}

  /* ── MISC ── */
  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty-icon{font-size:48px;margin-bottom:12px}
  .loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:14px;gap:8px}
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--t1);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Prop<span>Edge</span> <span style="color:var(--muted);font-size:12px;font-weight:500">V8</span></div>
    <div class="season-pills">
      <div class="season-pill">T1 <b id="pillT1HR">--</b></div>
      <div class="season-pill">T2 <b id="pillT2HR">--</b></div>
      <div class="season-pill"><b id="pillTotal">--</b> plays</div>
    </div>
  </div>
  <!-- Search row — hidden on stats tab via JS -->
  <div class="search-row" id="searchRow">
    <input class="search-input" id="searchBox" placeholder="Search players, teams…"
           onkeydown="if(event.key==='Enter')runSearch()">
    <button class="search-btn" onclick="runSearch()" title="Search">🔍</button>
  </div>
</div>

<div class="nav">
  <div class="nav-tab active" onclick="switchTab('plays')">Plays</div>
  <div class="nav-tab" onclick="switchTab('leaderboard')">Leaderboard</div>
  <div class="nav-tab" onclick="switchTab('stats')">Season Stats</div>
</div>

<!-- PLAYS TAB -->
<div id="tabPlays">
  <div class="date-row" id="dateRow"></div>
  <div class="tier-row">
    <div class="tier-btn t1 active" onclick="toggleTier('T1',this)">T1</div>
    <div class="tier-btn t2 active" onclick="toggleTier('T2',this)">T2</div>
    <div class="tier-btn t3 active" onclick="toggleTier('T3',this)">T3</div>
  </div>
  <div class="match-selector">
    <select class="match-select" id="matchSelect" onchange="applyFilters()">
      <option value="">All Games</option>
    </select>
  </div>
  <div class="status-bar">
    <span id="statusText"><span class="status-dot done"></span>Loading…</span>
    <span id="dayHR" style="font-weight:700;color:var(--t1)"></span>
  </div>
  <div class="cards" id="cardsContainer">
    <div class="loading"><div class="spinner"></div> Loading plays…</div>
  </div>
</div>

<!-- LEADERBOARD TAB -->
<div id="tabLeaderboard" style="display:none">
  <div class="lb-header">
    <span>#</span><span>Player</span>
    <span style="text-align:center">W</span><span style="text-align:center">L</span>
    <span style="text-align:center">Total</span><span style="text-align:center">HR%</span>
  </div>
  <div id="lbContainer"></div>
</div>

<!-- STATS TAB -->
<div id="tabStats" style="display:none">
  <div class="stats-grid" id="statsGrid"></div>
</div>

<script>
'use strict';

// ── STATE ─────────────────────────────────────────────────────────────────────
let ALL_PLAYS = [];
let ACTIVE_DATE = '';
let ACTIVE_TIERS = new Set(['T1','T2','T3']);
let ACTIVE_TAB = 'plays';
let SEARCH_QUERY = '';   // only updated when user clicks 🔍 or presses Enter

// ── DVP RAW — position-specific defensive rankings (1=toughest, 30=easiest) ──
const DVP_RAW = {
  BOS:{PG:4,SG:1,SF:1,PF:3,C:1},  DET:{PG:1,SG:7,SF:10,PF:17,C:5},
  GSW:{PG:16,SG:16,SF:16,PF:11,C:21}, ATL:{PG:12,SG:27,SF:27,PF:22,C:17},
  HOU:{PG:7,SG:3,SF:8,PF:1,C:7},  BKN:{PG:9,SG:26,SF:17,PF:23,C:19},
  MEM:{PG:24,SG:20,SF:21,PF:25,C:23}, LAC:{PG:19,SG:21,SF:6,PF:2,C:12},
  DAL:{PG:13,SG:29,SF:12,PF:26,C:27}, CLE:{PG:15,SG:10,SF:15,PF:16,C:20},
  CHA:{PG:5,SG:13,SF:2,PF:14,C:4},    DEN:{PG:14,SG:8,SF:20,PF:19,C:10},
  IND:{PG:29,SG:14,SF:28,PF:13,C:24}, LAL:{PG:11,SG:15,SF:22,PF:8,C:6},
  MIA:{PG:27,SG:18,SF:19,PF:27,C:14}, CHI:{PG:20,SG:17,SF:29,PF:28,C:26},
  NOP:{PG:21,SG:25,SF:23,PF:20,C:25}, UTA:{PG:30,SG:30,SF:24,PF:30,C:22},
  SAC:{PG:22,SG:28,SF:14,PF:18,C:29}, POR:{PG:18,SG:22,SF:26,PF:15,C:28},
  WAS:{PG:26,SG:23,SF:30,PF:29,C:30}, OKC:{PG:2,SG:11,SF:13,PF:4,C:8},
  NYK:{PG:3,SG:6,SF:9,PF:7,C:2},  PHI:{PG:8,SG:24,SF:18,PF:24,C:15},
  PHX:{PG:6,SG:2,SF:7,PF:9,C:16}, MIN:{PG:25,SG:4,SF:4,PF:10,C:13},
  ORL:{PG:23,SG:12,SF:3,PF:12,C:11},  TOR:{PG:17,SG:9,SF:5,PF:6,C:9},
  SAS:{PG:10,SG:5,SF:11,PF:5,C:18},   MIL:{PG:28,SG:19,SF:25,PF:21,C:3},
};

// Map position string → slot in DVP_RAW + short label
function posSlot(pos) {
  const p = (pos || '').toUpperCase().replace(/[^A-Z\-]/g,'');
  if (p==='PG'||p==='G')         return {slot:'PG', label:'GUA'};
  if (p==='SG')                  return {slot:'SG', label:'GUA'};
  if (p==='SF'||p==='F')         return {slot:'SF', label:'FWD'};
  if (p==='PF')                  return {slot:'PF', label:'FWD'};
  if (p==='C')                   return {slot:'C',  label:'CTR'};
  if (p==='G-F'||p==='F-G')      return {slot:'SG', label:'G-F'};
  if (p==='F-C'||p==='C-F')      return {slot:'C',  label:'F-C'};
  return {slot:'SF', label:'FWD'};  // default
}

function dvpRank(opp, pos) {
  const d = DVP_RAW[opp];
  if (!d) return 15;
  const {slot} = posSlot(pos);
  return d[slot] || 15;
}

function dvpTag(opp, pos) {
  const rank = dvpRank(opp, pos);
  const {label} = posSlot(pos);
  const cls = rank<=10 ? 'top' : (rank>=21 ? 'bot' : 'mid');
  return `<div class="tag def ${cls}">DEF ${label} #${rank}</div>`;
}

// ── SPARKLINE ────────────────────────────────────────────────────────────────
function spark(scores, line, w=150, h=30) {
  if (!scores || scores.length < 2) return '';
  const p=3, mn=Math.min(...scores,line)-2, mx=Math.max(...scores,line)+2, rn=mx-mn||1;
  const n=scores.length;
  const x=i=>p+((n-1-i)/(n-1))*(w-p*2);
  const y=v=>p+(1-(v-mn)/rn)*(h-p*2);
  const pts=scores.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const dots=scores.map((v,i)=>{
    const c=v>line?'var(--over)':'var(--under)';
    return `<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.5" fill="${c}"/>`;
  }).join('');
  const ly=y(line).toFixed(1);
  return `<svg width="${w}" height="${h}" style="display:block;overflow:visible">
    <line x1="${p}" y1="${ly}" x2="${w-p}" y2="${ly}" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3,2" opacity=".4"/>
    <polyline points="${pts}" fill="none" stroke="var(--t2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
  </svg>`;
}

// ── SCORE BUBBLES ────────────────────────────────────────────────────────────
function scoreBubbles(scores, homes, line) {
  if (!scores || !scores.length) return '';
  return scores.map((v,i) => {
    const isHome = homes && i < homes.length ? homes[i] : null;
    const venue = isHome===true ? '🏠' : isHome===false ? '✈️' : '';
    const bg = v > line ? 'rgba(0,229,160,.15)' : 'rgba(255,107,107,.12)';
    const col = v > line ? 'var(--over)' : 'var(--under)';
    return `<div class="bubble">
      <span class="bubble-venue">${venue}</span>
      <span class="bubble-score" style="background:${bg};color:${col}">${v}</span>
    </div>`;
  }).join('');
}

// ── LINE MOVEMENT PILL ───────────────────────────────────────────────────────
function lineMovePill(hist) {
  if (!hist || hist.length < 2) return '';
  const first = hist[0], last = hist[hist.length-1];
  if (first === last) return '';
  const diff = last - first;
  const arrow = diff > 0 ? '↑' : '↓';
  const cls   = diff > 0 ? 'up' : 'down';
  return `<div class="line-move-pill ${cls}">${first} → ${last} ${arrow}</div>`;
}

// ── COLOUR HELPER ─────────────────────────────────────────────────────────────
function clr(v, line) {
  if (v==null) return 'var(--muted)';
  return v > line ? 'var(--over)' : v < line ? 'var(--under)' : 'var(--muted)';
}

// ── SORT MATCH OPTIONS BY ET TIME ────────────────────────────────────────────
function parseET(gt) {
  if (!gt) return 999;
  const m = gt.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 999;
  let h = parseInt(m[1]), mm = parseInt(m[2]);
  const pm = m[3].toUpperCase()==='PM';
  if (pm && h!==12) h+=12;
  if (!pm && h===12) h=0;
  return h*60+mm;
}

// ── DATA LOAD ─────────────────────────────────────────────────────────────────
async function loadData() {
  console.log('PropEdge V8: loadData() started');
  try {
    console.log('Fetching today.json...');
    const r = await fetch('today.json?v='+Date.now());
    ALL_PLAYS = await r.json();
    console.log('PropEdge V8: loaded', ALL_PLAYS.length, 'plays');
    init();
  } catch(e) {
    console.error('PropEdge load error:', e);
    const msg = e && e.message ? e.message : String(e);
    document.getElementById('cardsContainer').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div>
       <p style="color:#ff6b6b;font-weight:700">Could not load today.json</p>
       <p style="font-size:11px;margin-top:8px;color:#888">${msg}</p>
       <p style="font-size:10px;margin-top:4px;color:#666">
         Check: github.com/iamwerewolf1007/PropEdgeV8.0/blob/main/today.json
       </p></div>`;
  }
}

function init() {
  const dates = [...new Set(ALL_PLAYS.map(p=>p.date))].sort().reverse();
  if (!ACTIVE_DATE && dates.length) ACTIVE_DATE = dates[0];
  const dr = document.getElementById('dateRow');
  dr.innerHTML = dates.map(d =>
    `<div class="date-chip${d===ACTIVE_DATE?' active':''}" onclick="selectDate('${d}')">${fmtDate(d)}</div>`
  ).join('');
  updateSeasonPills();
  applyFilters();
}

function fmtDate(d) {
  const dt = new Date(d+'T12:00:00');
  return dt.toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'});
}

// ── SEARCH: click-only, no live filtering ────────────────────────────────────
function runSearch() {
  SEARCH_QUERY = document.getElementById('searchBox').value.trim().toLowerCase();
  if (ACTIVE_TAB === 'leaderboard') renderLeaderboard();
  else applyFilters();
}

// ── FILTERS ──────────────────────────────────────────────────────────────────
function selectDate(d) {
  ACTIVE_DATE = d;
  SEARCH_QUERY = '';
  document.getElementById('searchBox').value = '';
  document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('active'));
  event.target.classList.add('active');
  applyFilters();
}

function toggleTier(tier, btn) {
  if (ACTIVE_TIERS.has(tier)) ACTIVE_TIERS.delete(tier);
  else ACTIVE_TIERS.add(tier);
  btn.classList.toggle('active');
  applyFilters();
}

function switchTab(tab) {
  ACTIVE_TAB = tab;
  ['plays','leaderboard','stats'].forEach((t,i) => {
    const tid = 'tab'+t.charAt(0).toUpperCase()+t.slice(1);
    document.getElementById(tid).style.display = t===tab?'':'none';
    document.querySelectorAll('.nav-tab')[i].classList.toggle('active', t===tab);
  });
  // Hide search on stats tab
  document.getElementById('searchRow').classList.toggle('hidden', tab==='stats');
  if (tab==='leaderboard') renderLeaderboard();
  if (tab==='stats')       renderStats();
}

function applyFilters() {
  const days = ALL_PLAYS.filter(p=>p.date===ACTIVE_DATE);

  // Build match select — sorted by ET game time then team names
  const gameMap = {};
  days.forEach(p=>{ if(!gameMap[p.game]) gameMap[p.game]=p.game_time||''; });
  const sortedGames = Object.keys(gameMap).sort((a,b)=>{
    const td = parseET(gameMap[a]) - parseET(gameMap[b]);
    return td !== 0 ? td : a.localeCompare(b);
  });
  const ms = document.getElementById('matchSelect');
  const curGame = ms.value;
  ms.innerHTML = '<option value="">All Games</option>' +
    sortedGames.map(g=>`<option value="${g}"${g===curGame?' selected':''}>${g}</option>`).join('');

  const selGame = ms.value;
  let filtered = days.filter(p =>
    ACTIVE_TIERS.has(p.tier) &&
    (!SEARCH_QUERY || p.player.toLowerCase().includes(SEARCH_QUERY) ||
                       p.team.toLowerCase().includes(SEARCH_QUERY) ||
                       p.opponent.toLowerCase().includes(SEARCH_QUERY)) &&
    (!selGame || p.game === selGame)
  );

  const tierOrd = {T1:0,T2:1,T3:2};
  filtered.sort((a,b)=>(tierOrd[a.tier]-tierOrd[b.tier])||(b.confidence-a.confidence));
  renderCards(filtered, days);
}

function renderCards(filtered, allDay) {
  const graded = allDay.filter(p=>p.result==='WIN'||p.result==='LOSS');
  const wins = graded.filter(p=>p.result==='WIN').length;
  const hrStr = graded.length ? `${Math.round(wins/graded.length*100)}% HR (${wins}W/${graded.length-wins}L)` : '';
  const isPreMatch = allDay.every(p=>!p.result);
  document.getElementById('dayHR').textContent = hrStr;
  document.getElementById('statusText').innerHTML =
    `<span class="status-dot ${isPreMatch?'live':'done'}"></span>${ACTIVE_DATE} — ${allDay.length} plays — ${isPreMatch?'Pre-Match':'Completed'}`;
  if (!filtered.length) {
    document.getElementById('cardsContainer').innerHTML =
      '<div class="empty"><div class="empty-icon">🏀</div><p>No plays match your filters</p></div>';
    return;
  }
  document.getElementById('cardsContainer').innerHTML = filtered.map(buildCard).join('');
}

function buildCard(p) {
  const tier = p.tier;
  const dir  = p.direction;
  const conf = Math.round(p.confidence*100);
  const confColor = tier==='T1'?'var(--t1)':tier==='T2'?'var(--t2)':'var(--t3)';
  const odds = dir==='OVER' ? p.over_odds : p.under_odds;
  const oddsStr = (odds>=0?'+':'')+odds;

  // Result badge
  const resBadge = p.result
    ? `<div class="result-badge ${p.result}">${p.result}${p.actual_pts!=null?' · '+p.actual_pts:''}</div>`
    : '';

  // Scoring averages row: Line / L10 / L20 / L30 + sparkline
  const l10 = p.l10 != null ? p.l10.toFixed(1) : '—';
  const l20 = p.l20 != null ? p.l20.toFixed(1) : '—';
  const l30 = p.l30 != null ? p.l30.toFixed(1) : '—';
  const statsRow = `<div class="stats-row">
    <div class="kv"><div class="kv-l">Line</div><div class="kv-v">${p.line}</div></div>
    <div class="kv-divider"></div>
    <div class="kv"><div class="kv-l">L10</div><div class="kv-v" style="color:${clr(p.l10,p.line)}">${l10}</div></div>
    <div class="kv"><div class="kv-l">L20</div><div class="kv-v" style="color:${clr(p.l20,p.line)}">${l20}</div></div>
    <div class="kv"><div class="kv-l">L30</div><div class="kv-v" style="color:${clr(p.l30,p.line)}">${l30}</div></div>
    <div class="spark-wrap">${spark(p.recent20, p.line, 150, 30)}</div>
  </div>`;

  // Score bubbles (last 20 games)
  const bubblesHtml = (p.recent20 && p.recent20.length)
    ? `<div class="bubbles-row">${scoreBubbles(p.recent20, p.recent20_homes, p.line)}</div>`
    : '';

  // Line movement pill
  const movePill = lineMovePill(p.line_history);

  // DEF tag with position-specific rank
  const defHtml = dvpTag(p.opponent, p.position);

  const b2bTag = p.is_b2b ? '<div class="tag" style="color:#ffd166">B2B</div>' : '';
  const homeTag = `<div class="tag">${p.is_home?'🏠 Home':'✈️ Away'}</div>`;

  return `<div class="card ${tier.toLowerCase()}">
    ${resBadge}
    <div class="card-top">
      <div>
        <div class="player-name">${p.player}</div>
        <div class="player-meta">${p.team} · ${p.position||'—'} · ${p.game_time||''}</div>
      </div>
      <div class="tier-badge ${tier}">${tier}</div>
    </div>
    ${statsRow}
    ${bubblesHtml}
    <div class="card-mid">
      <div class="direction-pill ${dir}">${dir}</div>
      <div class="line-block">
        <div class="line-display">${p.line} pts <span style="font-size:13px;color:var(--muted)">${oddsStr}</span></div>
        ${movePill}
      </div>
      <div class="conf-bar-wrap">
        <div class="conf-pct" style="color:${confColor}">${conf}%</div>
        <div class="conf-bar"><div class="conf-bar-fill" style="width:${conf}%;background:${confColor}"></div></div>
      </div>
    </div>
    <div class="card-bottom">
      ${defHtml}
      ${homeTag}
      ${b2bTag}
      <div class="tag">📚 ${p.books}</div>
    </div>
  </div>`;
}

// ── SEASON PILLS ──────────────────────────────────────────────────────────────
function updateSeasonPills() {
  const g = ALL_PLAYS.filter(p=>p.result==='WIN'||p.result==='LOSS');
  const t1g=g.filter(p=>p.tier==='T1'), t2g=g.filter(p=>p.tier==='T2');
  const t1hr = t1g.length ? Math.round(t1g.filter(p=>p.result==='WIN').length/t1g.length*100)+'%' : '--';
  const t2hr = t2g.length ? Math.round(t2g.filter(p=>p.result==='WIN').length/t2g.length*100)+'%' : '--';
  document.getElementById('pillT1HR').textContent = t1hr;
  document.getElementById('pillT2HR').textContent = t2hr;
  document.getElementById('pillTotal').textContent = ALL_PLAYS.length;
}

// ── LEADERBOARD — all players with correct ranks, top 100 visible ─────────────
function renderLeaderboard() {
  const q = SEARCH_QUERY;
  const playerMap = {};
  ALL_PLAYS.forEach(p => {
    if (p.result!=='WIN' && p.result!=='LOSS') return;
    if (!playerMap[p.player]) playerMap[p.player] = {name:p.player, team:p.team||'', w:0, l:0};
    if (p.result==='WIN') playerMap[p.player].w++;
    else                  playerMap[p.player].l++;
    if (!playerMap[p.player].team && p.team) playerMap[p.player].team = p.team;
  });

  // Build full sorted list — assign real rank to every player
  const ALL_SORTED = Object.values(playerMap)
    .sort((a,b) => (b.w+b.l)-(a.w+a.l) || (b.w/(b.w+b.l))-(a.w/(a.w+a.l)));

  // Filter for search but keep original rank
  const toShow = q
    ? ALL_SORTED.filter((r,i) => r.name.toLowerCase().includes(q) || r.team.toLowerCase().includes(q))
    : ALL_SORTED.slice(0, 100);   // top 100 visible by default

  const rankMap = {};
  ALL_SORTED.forEach((r,i) => rankMap[r.name] = i+1);

  const rankColors = (i) => i===0?'gold':i===1?'silver':i===2?'bronze':'';
  document.getElementById('lbContainer').innerHTML = toShow.map(r => {
    const rank = rankMap[r.name];
    const total = r.w+r.l;
    const hr = Math.round(r.w/total*100);
    const ri = rank-1;
    return `<div class="lb-row">
      <div class="lb-rank ${rankColors(ri)}">${rank}</div>
      <div><div class="lb-name">${r.name}</div><div class="lb-team">${r.team}</div></div>
      <div class="lb-num" style="color:var(--win)">${r.w}</div>
      <div class="lb-num" style="color:var(--loss)">${r.l}</div>
      <div class="lb-num">${total}</div>
      <div class="lb-hr">${hr}%</div>
    </div>`;
  }).join('') || '<div style="padding:20px 16px;color:var(--muted);font-size:13px">No players found</div>';
}

// ── SEASON STATS ──────────────────────────────────────────────────────────────
function renderStats() {
  const g=ALL_PLAYS.filter(p=>p.result==='WIN'||p.result==='LOSS');
  const wins=g.filter(p=>p.result==='WIN').length;
  const t1g=g.filter(p=>p.tier==='T1'); const t1w=t1g.filter(p=>p.result==='WIN').length;
  const t2g=g.filter(p=>p.tier==='T2'); const t2w=t2g.filter(p=>p.result==='WIN').length;
  const t3g=g.filter(p=>p.tier==='T3'); const t3w=t3g.filter(p=>p.result==='WIN').length;
  const pct=(w,n)=>n?Math.round(w/n*100)+'%':'--';
  const cards=[
    {val:pct(wins,g.length),      lbl:'Season HR',        sub:`${wins}W / ${g.length-wins}L`},
    {val:g.length,                lbl:'Total Graded',     sub:`${ALL_PLAYS.length} total plays`},
    {val:pct(t1w,t1g.length),     lbl:'T1 Hit Rate',      sub:`${t1g.length} plays`, col:'var(--t1)'},
    {val:pct(t2w,t2g.length),     lbl:'T2 Hit Rate',      sub:`${t2g.length} plays`, col:'var(--t2)'},
    {val:pct(t3w,t3g.length),     lbl:'T3 Hit Rate',      sub:`${t3g.length} plays`},
    {val:t1g.length,              lbl:'T1 Plays Graded',  sub:pct(t1w,t1g.length)+' HR'},
    {val:t2g.length,              lbl:'T2 Plays Graded',  sub:pct(t2w,t2g.length)+' HR'},
    {val:ALL_PLAYS.filter(p=>!p.result).length, lbl:'Ungraded', sub:'pending results'},
  ];
  document.getElementById('statsGrid').innerHTML = cards.map(c=>
    `<div class="stat-card">
      <div class="stat-val" style="color:${c.col||'var(--text)'}">${c.val}</div>
      <div class="stat-lbl">${c.lbl}</div>
      <div class="stat-sub">${c.sub||''}</div>
    </div>`
  ).join('');
}

loadData();
</script>
